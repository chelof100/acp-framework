\* TLC model-checking configuration for ACP_Extended.tla
\* Run: java -jar tla2tools.jar -deadlock -config ACP_Extended.cfg ACP_Extended.tla
\*
\* -deadlock: suppress terminal-state detection. The model has two intended
\* terminal states: now = MAX_TIME (time horizon exhausted) and Len(ledger) = 5
\* (ledger bound reached). Both are modeling bounds, not protocol deadlocks.

SPECIFICATION
    Spec

\* Finite model constants
\* 2 agents × 3 capabilities × 2 resources = 12 distinct request types
\* Ledger bound = 5, time horizon = 5 → tractable state space (~1M states)
CONSTANTS
    Agents           = {"A1", "A2"}
    Capabilities     = {"read", "financial", "admin"}
    Resources        = {"public", "sensitive"}
    COOLDOWN_TRIGGER = 3
    COOLDOWN_WINDOW  = 3
    MAX_TIME         = 5

\* State invariants — checked on every reachable state
INVARIANTS
    TypeInvariant
    Safety
    LedgerAppendOnly
    RiskDeterminism
    CooldownEnforced
    CooldownImpliesThreshold
    DelegationIntegrity

\* Temporal properties — checked over all traces (fairness via WF in Spec)
PROPERTIES
    LedgerAppendOnlyTemporal
    CooldownExpires
