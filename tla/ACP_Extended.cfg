\* TLC model-checking configuration for ACP_Extended.tla (Sprint J2)
\* Run: java -jar tla2tools.jar -deadlock -config ACP_Extended.cfg ACP_Extended.tla
\*
\* -deadlock: suppress terminal-state detection. Intended terminal states:
\*   now = MAX_TIME     (time horizon exhausted)
\*   Len(ledger) = LEDGER_BOUND  (ledger bound reached)
\* Both are modeling bounds, not protocol deadlocks.
\*
\* Sprint J2 additions: FLOOD_THRESHOLD, FANOM_BONUS, LEDGER_BOUND.
\*
\* Single-agent configuration for F_anom flood verification.
\* Per-agent enforcement is independent by design (pattern_count[a] and
\* last_decision[a] are per-agent); single-agent verification is
\* representative and generalizes to N agents trivially.
\*
\* State space notes:
\*   1 agent x 3 capabilities x 2 resources = 6 distinct request types.
\*   LEDGER_BOUND = 7 > FLOOD_THRESHOLD = 4: flood activation fires
\*   within the bounded state space (at request 5 onward).
\*   MAX_TIME = 7 ensures CooldownExpires and EventuallyRejected fire
\*   within the time horizon.

SPECIFICATION
    Spec

CONSTANTS
    Agents           = {"A1"}
    Capabilities     = {"read", "financial", "admin"}
    Resources        = {"public", "sensitive"}
    COOLDOWN_TRIGGER = 3
    COOLDOWN_WINDOW  = 3
    MAX_TIME         = 7
    FLOOD_THRESHOLD  = 4
    FANOM_BONUS      = 25
    LEDGER_BOUND     = 7

\* State invariants -- checked on every reachable state
INVARIANTS
    TypeInvariant
    Safety
    LedgerAppendOnly
    RiskDeterminism
    CooldownEnforced
    CooldownImpliesThreshold
    DelegationIntegrity
    AnomalyDeterminism
    FloodEnforced

\* Temporal properties -- checked over all traces (fairness via Fairness in Spec)
PROPERTIES
    LedgerAppendOnlyTemporal
    CooldownExpires
    EventuallyRejected
    NoInfiniteExecutionUnderAbuse
