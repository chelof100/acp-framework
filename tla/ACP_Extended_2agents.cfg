\* TLC configuration for ACP_Extended.tla — multi-agent interaction (Sprint J2c)
\* Run: java -jar tla2tools.jar -deadlock -config ACP_Extended_2agents.cfg ACP_Extended.tla
\*
\* Purpose: verify that per-agent enforcement is isolated under multi-agent interaction.
\* Key checks:
\*   - pattern_count[A1] does not affect pattern_count[A2] (isolation)
\*   - cooldown of A1 does not affect A2 (isolation)
\*   - A2 can continue being accepted while A1 is blocked (correct behavior)
\*
\* Bounds reduced for tractability with 2 agents:
\*   FLOOD_THRESHOLD = 3 (vs 4 in single-agent run)
\*   LEDGER_BOUND    = 5 (vs 7 in single-agent run)
\*   MAX_TIME        = 5 (vs 7 in single-agent run)
\* Goal: verify no violations, not reproduce full complexity of single-agent run.

SPECIFICATION
    Spec

CONSTANTS
    Agents           = {"A1", "A2"}
    Capabilities     = {"read", "financial", "admin"}
    Resources        = {"public", "sensitive"}
    COOLDOWN_TRIGGER = 3
    COOLDOWN_WINDOW  = 3
    MAX_TIME         = 5
    FLOOD_THRESHOLD  = 3
    FANOM_BONUS      = 25
    LEDGER_BOUND     = 5

\* State invariants
INVARIANTS
    TypeInvariant
    Safety
    LedgerAppendOnly
    RiskDeterminism
    CooldownEnforced
    CooldownImpliesThreshold
    DelegationIntegrity
    AnomalyDeterminism
    FloodEnforced

\* Temporal properties
PROPERTIES
    LedgerAppendOnlyTemporal
    CooldownExpires
    EventuallyRejected
    NoInfiniteExecutionUnderAbuse
