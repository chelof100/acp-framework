\* TLC configuration for ACP_Extended.tla — multi-agent interaction (Sprint J2c)
\* Run: java -jar tla2tools.jar -deadlock -config ACP_Extended_2agents.cfg ACP_Extended.tla
\*
\* Purpose: verify that per-agent enforcement is isolated under multi-agent interaction.
\* Key checks (SAFETY INVARIANTS ONLY):
\*   - pattern_count[A1] does not affect pattern_count[A2] (isolation)
\*   - cooldown of A1 does not affect A2 (isolation)
\*   - A2 can continue being accepted while A1 is blocked (correct behavior)
\*
\* Bounds reduced for tractability with 2 agents:
\*   FLOOD_THRESHOLD = 3 (vs 4 in single-agent run)
\*   LEDGER_BOUND    = 5 (vs 7 in single-agent run)
\*   MAX_TIME        = 5 (vs 7 in single-agent run)
\*
\* NOTE: Temporal liveness properties (EventuallyRejected, NoInfiniteExecutionUnderAbuse,
\* CooldownExpires, LedgerAppendOnlyTemporal) are NOT included in this configuration.
\* With reduced bounds (FLOOD_THRESHOLD=3, MAX_TIME=5), the time horizon is insufficient
\* to guarantee eventual rejection within the bounded trace — a model artifact, not a
\* protocol defect. Liveness is verified in the single-agent config (ACP_Extended.cfg)
\* with FLOOD_THRESHOLD=4 and MAX_TIME=7, where bounds are calibrated for liveness.
\* This configuration verifies only safety properties: per-agent isolation and
\* structural correctness under multi-agent interaction.
\*
\* Result: 3,011,690 states generated, 1,650,024 distinct states found, depth 11,
\* 1h 08min, 0 violations — all 9 safety invariants hold across the complete
\* bounded multi-agent state space.

SPECIFICATION
    Spec

CONSTANTS
    Agents           = {"A1", "A2"}
    Capabilities     = {"read", "financial", "admin"}
    Resources        = {"public", "sensitive"}
    COOLDOWN_TRIGGER = 3
    COOLDOWN_WINDOW  = 3
    MAX_TIME         = 5
    FLOOD_THRESHOLD  = 3
    FANOM_BONUS      = 25
    LEDGER_BOUND     = 5

\* Safety invariants only — isolation and structural correctness
\* Temporal liveness properties excluded (see note above)
INVARIANTS
    TypeInvariant
    Safety
    LedgerAppendOnly
    RiskDeterminism
    CooldownEnforced
    CooldownImpliesThreshold
    DelegationIntegrity
    AnomalyDeterminism
    FloodEnforced
